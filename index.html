<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json?v=3">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Handstand</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
      --accent: #c8b8ff; --accent-dim: rgba(200,184,255,0.15);
      --text: #e8e8f0; --muted: #6a6a8a;
      --success: #7fffb2; --danger: #ff7f9a; --rec: #ff4466;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; overflow-x: hidden; }

    nav { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 10; }
    nav button { flex: 1; padding: 1rem; background: none; border: none; color: var(--muted); font-family: inherit; font-size: 0.75rem; letter-spacing: 0.15em; cursor: pointer; border-bottom: 2px solid transparent; }
    nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
    nav .gear-btn { flex: 0; padding: 1rem 1.2rem; font-size: 1rem; }

    .view { display: none; padding: 1.5rem; }
    .view.active { display: block; }

    /* TRACK */
    #camera-view { display: none; flex-direction: column; align-items: center; gap: 1rem; padding: 1.5rem; }
    #camera-view.active { display: flex; }

    .video-container { position: relative; width: 100%; max-width: 400px; border-radius: 12px; overflow: hidden; background: #000; border: 1px solid var(--border); transition: border-color 0.3s, box-shadow 0.3s; }
    .video-container.recording { border-color: var(--rec); box-shadow: 0 0 0 2px rgba(255,68,102,0.3); }
    #video { width: 100%; display: block; opacity: 0; position: absolute; top: 0; left: 0; }
    #canvas { width: 100%; display: block; transform: scaleX(-1); }

    .zoom-row {
      display: none; align-items: center; gap: 0.75rem;
      width: 100%; max-width: 400px;
    }
    .zoom-row.visible { display: flex; }
    .zoom-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; white-space: nowrap; min-width: 40px; }
    .zoom-slider {
      flex: 1; -webkit-appearance: none; height: 2px;
      background: var(--border); border-radius: 2px; outline: none;
    }
    .zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }
    .zoom-val { font-size: 0.65rem; color: var(--accent); min-width: 32px; text-align: right; }

    .shape-badge {
      position: absolute; top: 0.5rem; right: 0.5rem;
      background: rgba(19,19,26,0.8); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.2rem 0.5rem;
      font-size: 0.6rem; letter-spacing: 0.15em; color: var(--accent);
      backdrop-filter: blur(4px);
    }
    .view-badge {
      position: absolute; top: 0.5rem; left: 0.5rem;
      background: rgba(19,19,26,0.8); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.2rem 0.5rem;
      font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted);
      backdrop-filter: blur(4px);
    }

    .timer-display { font-size: 4rem; font-weight: 700; letter-spacing: 0.05em; color: var(--accent); text-shadow: 0 0 30px rgba(200,184,255,0.5); transition: color 0.3s; min-width: 160px; text-align: center; }
    .timer-display.holding { color: var(--success); text-shadow: 0 0 30px rgba(127,255,178,0.5); }

    .status-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em; }
    .pose-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; flex-shrink: 0; }
    .pose-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rec); box-shadow: 0 0 8px var(--rec); animation: pulse 1s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #debug-info { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.1em; text-align: center; line-height: 1.8; display: none; }

    /* FEEDBACK CARD */
    .feedback-card {
      width: 100%; max-width: 400px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .feedback-card.has-content { border-color: rgba(200,184,255,0.3); }
    .feedback-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border);
      font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted);
    }
    .feedback-meta { display: flex; gap: 0.75rem; align-items: center; }
    .shape-tag { color: var(--accent); }
    .view-tag { color: var(--muted); }
    .feedback-body { padding: 0.75rem; min-height: 48px; }
    .feedback-text { font-size: 0.8rem; line-height: 1.6; color: var(--text); white-space: pre-wrap; }
    .feedback-placeholder { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; }
    .feedback-loading { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .feedback-thumb { width: 100%; display: block; opacity: 0.6; cursor: pointer; transition: opacity 0.2s; border-top: 1px solid var(--border); }
    .feedback-thumb:hover { opacity: 0.9; }

    .frame-carousel { position: relative; width: 100%; overflow: hidden; touch-action: pan-y; border-top: 1px solid var(--border); }
    .frame-track { display: flex; transition: transform 0.25s ease; }
    .frame-slide { min-width: 100%; position: relative; }
    .frame-slide img { width: 100%; display: block; opacity: 0.7; cursor: pointer; }
    .frame-slide img:hover { opacity: 0.95; }
    .frame-label {
      position: absolute; bottom: 0.5rem; left: 50%; transform: translateX(-50%);
      background: rgba(10,10,15,0.8); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.15rem 0.5rem;
      font-size: 0.55rem; letter-spacing: 0.15em; color: var(--accent);
      backdrop-filter: blur(4px); pointer-events: none;
    }
    .frame-dots { display: flex; justify-content: center; gap: 6px; padding: 0.4rem 0; }
    .frame-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background 0.2s; }
    .frame-dot.active { background: var(--accent); }

    .btn { padding: 0.8rem 2rem; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; font-size: 0.8rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .btn.danger { border-color: var(--danger); color: var(--danger); }
    .btn.rec-active { border-color: var(--rec); color: var(--rec); background: rgba(255,68,102,0.1); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }

    /* FIX 1 — hero CTA layout when camera is inactive */
    #camera-view.camera-inactive .video-container,
    #camera-view.camera-inactive .zoom-row,
    #camera-view.camera-inactive .timer-display,
    #camera-view.camera-inactive .status-row,
    #camera-view.camera-inactive #rec-status,
    #camera-view.camera-inactive #debug-info,
    #camera-view.camera-inactive .feedback-card,
    #camera-view.camera-inactive .divider,
    #camera-view.camera-inactive .manual-row,
    #camera-view.camera-inactive .note-input { display: none; }

    #camera-view.camera-inactive {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .manual-row { display: flex; gap: 0.5rem; align-items: center; width: 100%; max-width: 400px; }
    .manual-row input, .note-input { padding: 0.8rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.85rem; }
    .manual-row input { flex: 1; }
    .manual-row input:focus, .note-input:focus { outline: none; border-color: var(--accent); }
    .note-input { width: 100%; max-width: 400px; resize: none; height: 60px; }
    .divider { width: 100%; max-width: 400px; border: none; border-top: 1px solid var(--border); }

    /* LOG */
    .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; }
    .stat-cell { background: var(--surface); padding: 0.75rem; text-align: center; }
    .stat-val { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; margin-top: 0.2rem; }

    .chart-section { margin-bottom: 1.5rem; }
    .chart-label { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.15em; margin-bottom: 0.75rem; }
    .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 60px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar { width: 100%; background: var(--accent-dim); border-radius: 3px 3px 0 0; border: 1px solid rgba(200,184,255,0.2); min-height: 2px; }
    .bar.today { background: rgba(200,184,255,0.4); border-color: var(--accent); }
    .bar-day { font-size: 0.5rem; color: var(--muted); }

    .log-section-header { font-size: 0.6rem; color: var(--muted); letter-spacing: 0.2em; margin-bottom: 1rem; }
    .session-group { margin-bottom: 2rem; }
    .session-date { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
    .session-best { color: var(--accent); }
    .entry { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 0; border-bottom: 1px solid rgba(42,42,58,0.5); }
    .entry:last-child { border-bottom: none; }
    .entry-time { font-size: 1.4rem; font-weight: 700; color: var(--text); min-width: 70px; }
    .entry-detail { flex: 1; }
    .entry-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em; }
    .entry-note { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; font-style: italic; }
    .entry-delete { background: none; border: none; color: var(--border); cursor: pointer; font-size: 1rem; padding: 0.25rem; transition: color 0.2s; }
    .entry-delete:hover { color: var(--danger); }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); font-size: 0.8rem; letter-spacing: 0.1em; line-height: 2; }

    /* VIDEOS */
    .video-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
    .video-card video { width: 100%; display: block; background: #000; max-height: 280px; object-fit: contain; }
    .video-meta { padding: 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    .video-info { flex: 1; }
    .video-date { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--muted); }
    .video-duration { font-size: 1rem; font-weight: 700; color: var(--accent); margin-top: 0.2rem; }
    .video-note { font-size: 0.7rem; color: var(--muted); font-style: italic; margin-top: 0.2rem; }
    .video-actions { display: flex; gap: 0.5rem; }
    .icon-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; padding: 0.4rem 0.6rem; font-size: 0.7rem; letter-spacing: 0.1em; transition: all 0.2s; }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
    .icon-btn.del:hover { border-color: var(--danger); color: var(--danger); }

    /* SETTINGS MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,10,15,0.85); z-index: 50; align-items: center; justify-content: center; padding: 1.5rem; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 400px; }
    .modal-title { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 1.25rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 0.4rem; }
    .field input { width: 100%; padding: 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 0.8rem; }
    .field input:focus { outline: none; border-color: var(--accent); }
    .field-hint { font-size: 0.6rem; color: var(--muted); margin-top: 0.3rem; line-height: 1.5; }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .modal-actions .btn { flex: 1; padding: 0.7rem; }

    /* BIO PROGRESS */
    .bio-progress-section { margin-bottom: 1.5rem; }
    .bio-metric-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 0; border-bottom: 1px solid rgba(42,42,58,0.3);
    }
    .bio-metric-label { font-size: 0.55rem; letter-spacing: 0.15em; color: var(--muted); min-width: 60px; }
    .bio-metric-spark { flex: 1; height: 24px; }
    .bio-metric-val { font-size: 0.75rem; color: var(--accent); min-width: 42px; text-align: right; font-weight: 700; }
    .bio-metric-trend { font-size: 0.6rem; min-width: 16px; text-align: center; }

    /* ENTRY BIO BADGES */
    .entry-bio { display: flex; gap: 0.5rem; margin-top: 0.2rem; flex-wrap: wrap; }
    .entry-bio-tag { font-size: 0.55rem; letter-spacing: 0.1em; color: var(--muted); background: rgba(200,184,255,0.06); padding: 0.1rem 0.35rem; border-radius: 3px; }

    /* TOAST */
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface); border: 1px solid var(--accent); color: var(--accent); padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.75rem; letter-spacing: 0.1em; transition: transform 0.3s ease; z-index: 100; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<nav>
  <button class="active" onclick="switchTab('camera')">TRACK</button>
  <button onclick="switchTab('log')">LOG</button>
  <button onclick="switchTab('videos')">VIDEOS</button>
  <button class="gear-btn" onclick="openSettings()">⚙</button>
</nav>

<!-- TRACK -->
<div id="camera-view" class="view active camera-inactive">
  <div class="video-container" id="video-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="view-badge" id="view-badge">—</div>
    <div class="shape-badge" id="shape-badge" style="display:none;"></div>
  </div>

  <div class="zoom-row" id="zoom-row">
    <span class="zoom-label">ZOOM</span>
    <input type="range" class="zoom-slider" id="zoom-slider" min="0.5" max="3" step="0.1" value="1" oninput="applyZoom(this.value)">
    <span class="zoom-val" id="zoom-val">1×</span>
    <button class="btn" id="flip-btn" onclick="flipCamera()" style="padding:0.4rem 0.75rem;font-size:0.75rem;">⇄</button>
    <button class="btn" id="mirror-btn" onclick="toggleMirror()" style="padding:0.4rem 0.75rem;font-size:0.75rem;">MIR</button>
    <button class="btn" id="cal-btn" onclick="calibrateUser()" style="padding:0.4rem 0.75rem;font-size:0.75rem;display:none;" title="Calibrate to track only you when multiple people are on screen">CAL</button>
  </div>

  <div class="timer-display" id="timer">0.0</div>

  <div class="status-row">
    <span class="pose-dot" id="pose-dot"></span>
    <span id="pose-status">waiting for camera...</span>
  </div>
  <div class="status-row" id="rec-status" style="display:none;">
    <span class="rec-dot"></span>
    <span>recording</span>
  </div>

  <div id="debug-info"></div>

  <!-- FEEDBACK CARD -->
  <div class="feedback-card" id="feedback-card">
    <div class="feedback-header">
      <span>ANALYSIS</span>
      <div class="feedback-meta">
        <span class="shape-tag" id="fb-shape"></span>
        <span class="view-tag" id="fb-view"></span>
      </div>
    </div>
    <div class="feedback-body">
      <div class="feedback-placeholder" id="fb-placeholder">hold detected → analyse</div>
      <div class="feedback-text" id="fb-text" style="display:none;"></div>
      <div class="feedback-loading" id="fb-loading" style="display:none;">analysing...</div>
    </div>
    <div class="frame-carousel" id="frame-carousel" style="display:none;">
      <div class="frame-track" id="frame-track"></div>
      <div class="frame-dots" id="frame-dots"></div>
    </div>
  </div>

  <hr class="divider">

  <div class="manual-row">
    <input type="number" id="manual-seconds" placeholder="manual seconds" min="0" step="0.1">
    <button class="btn" onclick="logManual()">LOG</button>
  </div>
  <textarea class="note-input" id="note" placeholder="notes (optional)..."></textarea>

  <div class="btn-row">
    <button class="btn primary" onclick="startCamera()" id="cam-btn">START CAMERA</button>
    <button class="btn" onclick="toggleRecord()" id="rec-btn" style="display:none;">REC</button>
    <button class="btn" onclick="analyseLastHold()" id="analyse-btn" style="display:none;">ANALYSE</button>
    <button class="btn" onclick="toggleDebug()" id="debug-btn" style="display:none;font-size:0.65rem;">DEBUG</button>
  </div>
</div>

<!-- LOG -->
<div id="log-view" class="view">
  <div class="stats-bar" id="stats-bar"></div>
  <div class="chart-section">
    <div class="chart-label">BEST HOLD / DAY — 14 DAYS</div>
    <div class="bar-chart" id="bar-chart"></div>
  </div>
  <div id="bio-progress"></div>
  <div class="log-section-header">SESSIONS</div>
  <div id="entries"></div>
</div>

<!-- VIDEOS -->
<div id="videos-view" class="view">
  <div id="video-list"></div>
</div>

<!-- SETTINGS -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-title">SETTINGS</div>
    <div class="field">
      <label>ANTHROPIC API KEY</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-...">
      <div class="field-hint">Used for post-hold coaching analysis. Stored locally, never sent anywhere except api.anthropic.com.</div>
    </div>
    <div class="field">
      <label>ANALYSIS THRESHOLD (seconds)</label>
      <input type="number" id="threshold-input" placeholder="3" min="1" step="0.5">
      <div class="field-hint">Minimum hold duration to enable analysis button.</div>
    </div>
    <div class="field">
      <label>TRAINING DATA</label>
      <div class="field-hint" id="data-stats"></div>
      <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
        <button class="btn" onclick="exportTrainingData()" style="flex:1;padding:0.6rem;font-size:0.7rem;">EXPORT JSON</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeSettings()">CANCEL</button>
      <button class="btn primary" onclick="saveSettings()">SAVE</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js" crossorigin="anonymous"></script>

<script>
// ── STATE ──
let db = JSON.parse(localStorage.getItem('handstand-log') || '[]');
let holdStart = null, holdDuration = 0, timerInterval = null;
let isHolding = false, cameraStarted = false, videoEl = null;

// Last hold snapshot (for analysis)
let lastHoldFrames = {};    // { shape: { frame, score, view } } — best frame per shape
let lastHoldShape = null;   // dominant shape (longest held)
let lastHoldView = null;    // 'side'|'front'
let lastHoldDuration = 0;
let currentShape = null;
let currentView = null;

// Frame sampling during hold
let holdFrameCandidates = {};  // { shape: { frame, score, view } }
let holdShapeTimes = {};       // { shape: totalMs } — tracks time in each shape
let lastSampleTime = 0;
let lastShapeChangeTime = 0;

// Biomechanics
let lastHoldBio = null;

// Recording
let mediaRecorder = null, recChunks = [], isRecording = false;
let recHolds = [];

// Camera
let cameraTrack = null;
let facingMode = 'user';
let zoomLevel = 1.0;
let hwZoomMin = 1, hwZoomMax = 1, hwZoomSupported = false;

// Mirror — default false (non-mirrored = coach/natural view)
let mirrorEnabled = localStorage.getItem('mirrorPref') === 'true';

// ── PERSON TRACKING (ONNX) ──
let yoloSession = null, reidSession = null;
let trackedBbox = null;            // current person's bbox [x1,y1,x2,y2] normalized 0-1
let calibrationEmbedding = null;   // saved OSNet embedding from calibration
let byteTracker = null;
let yoloFrameCounter = 0;          // run YOLO every N frames
let yoloInferenceCount = 0;        // for periodic session recreation (iOS WebGPU stability)
let reidInferenceCount = 0;
const YOLO_DETECT_INTERVAL = 4;    // YOLO every 4 frames; Kalman fills in between
const ONNX_SESSION_RECREATE_AT = 400;
let onnxBusy = false;              // prevent re-entrant inference
let isCalibrating = false;
const MODEL_BASE = 'models/';      // relative path; works under any deployment prefix

// Restore calibration from previous session
try {
  const stored = localStorage.getItem('calibrationEmbedding');
  if (stored) calibrationEmbedding = JSON.parse(stored);
} catch (e) { calibrationEmbedding = null; }

// ── SETTINGS ──
function getSetting(key, def) { return localStorage.getItem('hs-' + key) || def; }
function setSetting(key, val) { localStorage.setItem('hs-' + key, val); }

function openSettings() {
  document.getElementById('api-key-input').value = getSetting('apiKey', '');
  document.getElementById('threshold-input').value = getSetting('threshold', '3');
  const bioCount = db.filter(e => e.bio).length;
  document.getElementById('data-stats').textContent = `${db.length} holds total · ${bioCount} with biomechanics data`;
  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }
function saveSettings() {
  setSetting('apiKey', document.getElementById('api-key-input').value.trim());
  setSetting('threshold', document.getElementById('threshold-input').value || '3');
  closeSettings();
  showToast('saved');
}

// ── INDEXEDDB ──
let idb = null;
function openIDB() {
  return new Promise((res, rej) => {
    if (idb) return res(idb);
    const r = indexedDB.open('handstand-videos', 2);
    r.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('videos'))
        db.createObjectStore('videos', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('bio-series'))
        db.createObjectStore('bio-series', { keyPath: 'holdId' });
    };
    r.onsuccess = e => { idb = e.target.result; res(idb); };
    r.onerror = rej;
  });
}
function saveBioSeries(holdId, series) {
  return openIDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction('bio-series', 'readwrite');
    tx.objectStore('bio-series').put({ holdId, series });
    tx.oncomplete = res; tx.onerror = rej;
  }));
}
function getAllBioSeries() {
  return openIDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction('bio-series', 'readonly');
    const r = tx.objectStore('bio-series').getAll();
    r.onsuccess = e => res(e.target.result);
    r.onerror = rej;
  }));
}
function saveVideoDB(rec) {
  return openIDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction('videos', 'readwrite');
    tx.objectStore('videos').put(rec);
    tx.oncomplete = res; tx.onerror = rej;
  }));
}
function getAllVideos() {
  return openIDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction('videos', 'readonly');
    const r = tx.objectStore('videos').getAll();
    r.onsuccess = e => res(e.target.result.sort((a,b) => b.id - a.id));
    r.onerror = rej;
  }));
}
function deleteVideoDB(id) {
  return openIDB().then(db => new Promise((res, rej) => {
    const tx = db.transaction('videos', 'readwrite');
    tx.objectStore('videos').delete(id);
    tx.oncomplete = res; tx.onerror = rej;
  }));
}

// ── GEOMETRY HELPERS ──
function angleBetween(a, b, c) {
  const ba = { x: a.x - b.x, y: a.y - b.y };
  const bc = { x: c.x - b.x, y: c.y - b.y };
  const dot = ba.x * bc.x + ba.y * bc.y;
  const mag = Math.sqrt(ba.x**2 + ba.y**2) * Math.sqrt(bc.x**2 + bc.y**2);
  if (mag === 0) return 180;
  return Math.acos(Math.min(1, Math.max(-1, dot / mag))) * 180 / Math.PI;
}

function lineDeviation(a, b, mid) {
  // perpendicular distance from mid to line a→b, normalised by frame width
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len === 0) return 0;
  return Math.abs((b.x - a.x) * (a.y - mid.y) - (a.x - mid.x) * (b.y - a.y)) / len;
}

// ── VIEW DETECTION ──
function detectView(lm) {
  const spread = Math.abs(lm[11].x - lm[12].x);
  if (spread < 0.18) return 'side';
  if (spread > 0.22) return 'front';
  return 'unknown';
}

// ── SHAPE DETECTION ──
// Works in both view modes; angles are view-dependent in accuracy
function detectShape(lm) {
  const leftKnee  = angleBetween(lm[23], lm[25], lm[27]); // hip-knee-ankle L
  const rightKnee = angleBetween(lm[24], lm[26], lm[28]); // hip-knee-ankle R
  const avgKnee   = (leftKnee + rightKnee) / 2;

  // ankle spread (x-axis) — reliable in front view, less so in side
  const ankleSpreadX = Math.abs(lm[27].x - lm[28].x);
  // ankle spread (y-axis) — reliable in side view for straddle
  const ankleSpreadY = Math.abs(lm[27].y - lm[28].y);
  const ankleSpread  = Math.max(ankleSpreadX, ankleSpreadY);

  if (avgKnee < 130) return 'tuck';
  if (ankleSpread > 0.2) return 'straddle';
  return 'full';
}

// ── BODY LINE ANALYSIS (side view only) ──
function analyzeBodyLine(lm) {
  // wrist → shoulder → hip → ankle should be collinear
  const wrist    = { x: (lm[15].x + lm[16].x)/2, y: (lm[15].y + lm[16].y)/2 };
  const shoulder = { x: (lm[11].x + lm[12].x)/2, y: (lm[11].y + lm[12].y)/2 };
  const hip      = { x: (lm[23].x + lm[24].x)/2, y: (lm[23].y + lm[24].y)/2 };
  const ankle    = { x: (lm[27].x + lm[28].x)/2, y: (lm[27].y + lm[28].y)/2 };

  const hipDev      = lineDeviation(wrist, ankle, hip);
  const shoulderDev = lineDeviation(wrist, ankle, shoulder);

  // hip forward of line = banana; hip behind = pike
  const midlineX = wrist.x + (ankle.x - wrist.x) * ((hip.y - wrist.y) / (ankle.y - wrist.y || 0.001));
  const banana = hip.x - midlineX; // positive = banana (hip toward camera in side view)

  return { hipDev, shoulderDev, banana };
}

// ── BIOMECHANICS ENGINE ──
// Body segment mass fractions and COM positions (de Leva 1996, male)
const BODY_SEGMENTS = [
  // { proximal landmark, distal landmark, mass fraction, COM fraction from proximal }
  { prox: 'nose', dist: 'midShoulder', mass: 0.0694, comFrac: 0.50 },     // head+neck
  { prox: 'midShoulder', dist: 'midHip', mass: 0.4346, comFrac: 0.4495 }, // trunk
  { prox: 11, dist: 13, mass: 0.0271, comFrac: 0.5772 },  // L upper arm
  { prox: 12, dist: 14, mass: 0.0271, comFrac: 0.5772 },  // R upper arm
  { prox: 13, dist: 15, mass: 0.0223, comFrac: 0.4574 },  // L forearm+hand
  { prox: 14, dist: 16, mass: 0.0223, comFrac: 0.4574 },  // R forearm+hand
  { prox: 23, dist: 25, mass: 0.1416, comFrac: 0.4095 },  // L thigh
  { prox: 24, dist: 26, mass: 0.1416, comFrac: 0.4095 },  // R thigh
  { prox: 25, dist: 27, mass: 0.0570, comFrac: 0.4459 },  // L shank+foot
  { prox: 26, dist: 28, mass: 0.0570, comFrac: 0.4459 },  // R shank+foot
];

function getLandmarkPos(lm, id) {
  if (id === 'nose') return lm[0];
  if (id === 'midShoulder') return { x: (lm[11].x + lm[12].x) / 2, y: (lm[11].y + lm[12].y) / 2 };
  if (id === 'midHip') return { x: (lm[23].x + lm[24].x) / 2, y: (lm[23].y + lm[24].y) / 2 };
  return lm[id];
}

// Mass fractions above each joint (for torque computation)
const MASS_ABOVE_SHOULDER = 0.0694 + 0.4346 + 0.1416*2 + 0.0570*2; // ~0.90
const MASS_ABOVE_HIP = 0.1416*2 + 0.0570*2;                         // ~0.40
const MASS_ABOVE_KNEE = 0.0570*2;                                     // ~0.11

function computeBiomechanics(lm) {
  // Whole-body center of mass
  let comX = 0, comY = 0;
  for (const seg of BODY_SEGMENTS) {
    const p = getLandmarkPos(lm, seg.prox);
    const d = getLandmarkPos(lm, seg.dist);
    comX += seg.mass * (p.x + seg.comFrac * (d.x - p.x));
    comY += seg.mass * (p.y + seg.comFrac * (d.y - p.y));
  }

  // Base of support (wrists)
  const wristMidX = (lm[15].x + lm[16].x) / 2;
  const wristMidY = (lm[15].y + lm[16].y) / 2;
  const wristSpread = Math.abs(lm[15].x - lm[16].x);

  // COM offset from wrist midpoint
  const comOffsetX = comX - wristMidX;
  const comOffsetY = comY - wristMidY;

  // Stability margin: how centered is COM over base
  const halfBase = wristSpread / 2;
  const stabilityMargin = halfBase > 0.001 ? Math.max(0, Math.min(1, 1 - Math.abs(comOffsetX) / halfBase)) : 0;

  // Joint angles
  const shoulderAngle = (angleBetween(lm[23], lm[11], lm[13]) + angleBetween(lm[24], lm[12], lm[14])) / 2;
  const hipAngle = (angleBetween(lm[11], lm[23], lm[25]) + angleBetween(lm[12], lm[24], lm[26])) / 2;
  const kneeAngle = (angleBetween(lm[23], lm[25], lm[27]) + angleBetween(lm[24], lm[26], lm[28])) / 2;
  const elbowAngle = (angleBetween(lm[11], lm[13], lm[15]) + angleBetween(lm[12], lm[14], lm[16])) / 2;

  // Body line
  const bl = analyzeBodyLine(lm);

  // Symmetry
  const hipTilt = Math.abs(lm[23].y - lm[24].y);
  const shoulderTilt = Math.abs(lm[11].y - lm[12].y);

  // Per-joint horizontal drift from vertical (wrist plumb line)
  const shoulderDriftX = ((lm[11].x + lm[12].x) / 2) - wristMidX;
  const hipDriftX = ((lm[23].x + lm[24].x) / 2) - wristMidX;
  const kneeDriftX = ((lm[25].x + lm[26].x) / 2) - wristMidX;

  // Joint torques — relative torque = mass_above × |horizontal deviation from vertical|
  // Units are arbitrary but proportional to real torque. Higher = joint working harder.
  const shoulderTorque = MASS_ABOVE_SHOULDER * Math.abs(shoulderDriftX);
  const hipTorque = MASS_ABOVE_HIP * Math.abs(hipDriftX);
  const kneeTorque = MASS_ABOVE_KNEE * Math.abs(kneeDriftX);
  const peakTorqueJoint = shoulderTorque >= hipTorque && shoulderTorque >= kneeTorque ? 0
                        : hipTorque >= kneeTorque ? 1 : 2; // 0=shoulder, 1=hip, 2=knee

  // Alignment quality score (0-100, higher = better)
  let alignmentScore = 100;
  alignmentScore -= Math.max(0, 180 - shoulderAngle) * 1.5;
  alignmentScore -= Math.max(0, 180 - hipAngle) * 1.0;
  alignmentScore -= Math.max(0, 180 - elbowAngle) * 0.5;
  alignmentScore -= Math.abs(bl.banana) * 300;
  alignmentScore -= Math.abs(comOffsetX) * 150;
  alignmentScore -= hipTilt * 80;
  alignmentScore -= shoulderTilt * 80;
  alignmentScore = Math.max(0, Math.min(100, Math.round(alignmentScore)));

  // Wall detection indicators
  const ankleAvgX = (lm[27].x + lm[28].x) / 2;
  const ankleAtEdge = (ankleAvgX < 0.08 || ankleAvgX > 0.92) ? 1 : 0;
  const ankleAvgY = (lm[27].y + lm[28].y) / 2;

  // Landmark confidence (average visibility of key joints)
  const KEY_LM = [11,12,15,16,23,24,27,28];
  const avgVisibility = KEY_LM.reduce((s, i) => s + (lm[i].visibility || 0), 0) / KEY_LM.length;

  // Feet spread (for detecting both feet on wall vs one foot)
  const feetSpreadY = Math.abs(lm[27].y - lm[28].y);

  return {
    comX, comY, comOffsetX, comOffsetY, stabilityMargin,
    shoulderAngle, hipAngle, kneeAngle, elbowAngle,
    bodyLineDev: bl.hipDev, bananaScore: bl.banana,
    hipTilt, shoulderTilt,
    shoulderDriftX, hipDriftX, kneeDriftX,
    shoulderTorque, hipTorque, kneeTorque, peakTorqueJoint,
    alignmentScore,
    ankleAtEdge, ankleAvgX, ankleAvgY, avgVisibility, feetSpreadY,
  };
}

// ── BIO ACCUMULATOR (running average + time-series + velocity + wall detection) ──
let holdBioSum = {};
let holdBioCount = 0;
let holdBioSeries = [];
let lastBioSampleTime = 0;
let prevBioComX = null, prevBioComY = null, prevBioTime = null;
let smoothComVx = 0, smoothComVy = 0;
const VEL_SMOOTH = 0.15;
// Ankle movement tracking for wall detection
let prevAnkleX = null, prevAnkleY = null;
let ankleMovementSum = 0, ankleMovementCount = 0;
// Alignment score history for phase analysis
let holdAlignmentHistory = [];

function resetBioAccum() {
  holdBioSum = {};
  holdBioCount = 0;
  holdBioSeries = [];
  lastBioSampleTime = 0;
  prevBioComX = null; prevBioComY = null; prevBioTime = null;
  smoothComVx = 0; smoothComVy = 0;
  prevAnkleX = null; prevAnkleY = null;
  ankleMovementSum = 0; ankleMovementCount = 0;
  holdAlignmentHistory = [];
}

function accumBio(lm) {
  const bio = computeBiomechanics(lm);

  // COM velocity (smoothed EMA)
  const now = Date.now();
  if (prevBioComX !== null && prevBioTime !== null) {
    const dt = (now - prevBioTime) / 1000;
    if (dt > 0.01 && dt < 1) {
      const vx = (bio.comX - prevBioComX) / dt;
      const vy = (bio.comY - prevBioComY) / dt;
      smoothComVx = smoothComVx * (1 - VEL_SMOOTH) + vx * VEL_SMOOTH;
      smoothComVy = smoothComVy * (1 - VEL_SMOOTH) + vy * VEL_SMOOTH;
    }
  }
  prevBioComX = bio.comX; prevBioComY = bio.comY; prevBioTime = now;

  bio.comVx = smoothComVx;
  bio.comVy = smoothComVy;
  bio.comSpeed = Math.sqrt(smoothComVx**2 + smoothComVy**2);

  // Predictive stability: time until COM exits base of support
  const halfBase = Math.abs(lm[15].x - lm[16].x) / 2;
  const distToEdge = Math.max(0, halfBase - Math.abs(bio.comOffsetX));
  bio.timeToEdge = Math.abs(smoothComVx) > 0.001 ? distToEdge / Math.abs(smoothComVx) : 99;

  // Ankle movement tracking (for wall detection)
  const ankleX = (lm[27].x + lm[28].x) / 2;
  const ankleY = (lm[27].y + lm[28].y) / 2;
  if (prevAnkleX !== null) {
    ankleMovementSum += Math.sqrt((ankleX - prevAnkleX)**2 + (ankleY - prevAnkleY)**2);
    ankleMovementCount++;
  }
  prevAnkleX = ankleX; prevAnkleY = ankleY;

  // Alignment history (for phase analysis)
  holdAlignmentHistory.push(bio.alignmentScore);

  for (const k in bio) holdBioSum[k] = (holdBioSum[k] || 0) + bio[k];
  holdBioCount++;

  // Time-series at ~5fps for training data
  if (now - lastBioSampleTime >= 200) {
    lastBioSampleTime = now;
    holdBioSeries.push({
      t: now - holdStart,
      comX: bio.comX, comY: bio.comY,
      comOffsetX: bio.comOffsetX, comOffsetY: bio.comOffsetY,
      comVx: bio.comVx, comVy: bio.comVy, comSpeed: bio.comSpeed,
      shoulderAngle: bio.shoulderAngle, hipAngle: bio.hipAngle,
      kneeAngle: bio.kneeAngle, elbowAngle: bio.elbowAngle,
      bananaScore: bio.bananaScore, stabilityMargin: bio.stabilityMargin,
      shoulderTorque: bio.shoulderTorque, hipTorque: bio.hipTorque,
      alignmentScore: bio.alignmentScore,
      ankleAtEdge: bio.ankleAtEdge, avgVisibility: bio.avgVisibility,
      hipTilt: bio.hipTilt, shoulderTilt: bio.shoulderTilt,
      timeToEdge: bio.timeToEdge,
    });
  }
}

function finalizeBio() {
  if (!holdBioCount) return null;
  const avg = {};
  for (const k in holdBioSum) avg[k] = holdBioSum[k] / holdBioCount;
  avg.frameCount = holdBioCount;
  // Ankle movement (not in bio state, tracked separately)
  avg.avgAnkleMovement = ankleMovementCount > 0 ? ankleMovementSum / ankleMovementCount : 0;
  // Hold type classification
  avg.holdType = classifyHoldType(avg);
  // Phase analysis
  avg.phases = analyzeHoldPhases(holdAlignmentHistory);
  return avg;
}

// ── HOLD TYPE CLASSIFICATION ──
function classifyHoldType(bio) {
  // Wall indicators:
  // 1. Ankles consistently near frame edge (wall is at the edge of camera view)
  // 2. Very low ankle movement (feet planted on wall don't micro-adjust)
  // 3. Low landmark visibility could indicate spotter occlusion

  const edgeRatio = bio.ankleAtEdge || 0;  // fraction of frames with ankle at edge
  const movement = bio.avgAnkleMovement || 999;
  const vis = bio.avgVisibility || 1;

  // Strong wall signal: high edge ratio + low movement
  if (edgeRatio > 0.4 && movement < 0.004) return 'wall';
  // Moderate wall signal: very still feet even if not at edge (wall nearby but not at frame edge)
  if (movement < 0.0015 && edgeRatio > 0.15) return 'wall';
  // Possible spotter: landmark visibility drops significantly
  if (vis < 0.45) return 'spotted';
  // Uncertain: moderate indicators
  if (edgeRatio > 0.25 && movement < 0.005) return 'wall-likely';

  return 'freestanding';
}

// ── HOLD PHASE ANALYSIS ──
function analyzeHoldPhases(alignHistory) {
  if (alignHistory.length < 9) return null; // need enough frames for 3 phases
  const third = Math.floor(alignHistory.length / 3);
  const entry  = alignHistory.slice(0, third);
  const steady = alignHistory.slice(third, 2 * third);
  const exit   = alignHistory.slice(2 * third);

  const avg = arr => arr.reduce((s, v) => s + v, 0) / arr.length;
  const entryScore  = avg(entry);
  const steadyScore = avg(steady);
  const exitScore   = avg(exit);

  // Stability: standard deviation of alignment during steady phase
  const steadyMean = steadyScore;
  const steadyStd = Math.sqrt(avg(steady.map(v => (v - steadyMean)**2)));

  // Fatigue: how much alignment drops from steady to exit
  const fatigue = steadyScore - exitScore; // positive = degrading

  // Entry quality: how quickly alignment stabilizes
  const entryImprovement = steadyScore - entryScore; // positive = improved after entry

  return {
    entryScore: Math.round(entryScore),
    steadyScore: Math.round(steadyScore),
    exitScore: Math.round(exitScore),
    steadyStability: Math.round(steadyStd * 10) / 10,
    fatigue: Math.round(fatigue * 10) / 10,
    entryImprovement: Math.round(entryImprovement * 10) / 10,
    pattern: fatigue > 5 ? 'degrading' : fatigue < -3 ? 'improving' : 'stable',
  };
}

// ── COACHING CUE GENERATOR ──
const JOINT_NAMES = ['shoulder', 'hip', 'knee'];

function generateCoachingCues(bio, shape, view, duration) {
  const cues = [];

  // Elbow angle — arms must be locked
  if (bio.elbowAngle < 160)
    cues.push({ p: 11, text: `Bent elbows (${bio.elbowAngle.toFixed(0)}°). Lock out arms — straight elbows are non-negotiable.` });
  else if (bio.elbowAngle < 172)
    cues.push({ p: 6, text: `Elbows slightly soft (${bio.elbowAngle.toFixed(0)}°). Push through the heels of your hands, lock arms fully.` });

  // Shoulder angle (180° = fully open overhead)
  if (bio.shoulderAngle < 160)
    cues.push({ p: 10, text: `Shoulders closed (${bio.shoulderAngle.toFixed(0)}°). Push the floor away hard, reach tall through your arms.` });
  else if (bio.shoulderAngle < 170)
    cues.push({ p: 7, text: `Shoulder angle ${bio.shoulderAngle.toFixed(0)}° — press hands into floor, stretch up to open fully.` });

  // Hip angle (180° = fully extended)
  if (bio.hipAngle < 160)
    cues.push({ p: 10, text: `Piked at hips (${bio.hipAngle.toFixed(0)}°). Extend toward ceiling, drive hips over shoulders.` });
  else if (bio.hipAngle < 170)
    cues.push({ p: 6, text: `Hip angle ${bio.hipAngle.toFixed(0)}° — lengthen through the hips, push up.` });

  // Banana / pike (body line deviation)
  if (bio.bananaScore > 0.025)
    cues.push({ p: 9, text: 'Banana back. Squeeze glutes, tuck ribs, posterior pelvic tilt.' });
  else if (bio.bananaScore > 0.012)
    cues.push({ p: 5, text: 'Slight arch in lower back. Engage core, flatten the lumbar curve.' });
  else if (bio.bananaScore < -0.025)
    cues.push({ p: 6, text: 'Over-piked. Relax the tuck slightly, find neutral pelvis.' });

  // COM lateral shift
  if (Math.abs(bio.comOffsetX) > 0.04) {
    const dir = bio.comOffsetX > 0 ? 'right' : 'left';
    cues.push({ p: 7, text: `Weight shifted ${dir} of center. Press evenly through both hands.` });
  }

  // Knees (full shape only)
  if (shape === 'full' && bio.kneeAngle < 165)
    cues.push({ p: 4, text: `Soft knees (${bio.kneeAngle.toFixed(0)}°). Squeeze quads, lock out legs.` });

  // Symmetry
  if (bio.hipTilt > 0.035)
    cues.push({ p: 5, text: 'Hips uneven — level your pelvis, check if one leg drifts.' });
  if (bio.shoulderTilt > 0.035)
    cues.push({ p: 4, text: 'Shoulders uneven — distribute weight evenly between hands.' });

  // Stability
  if (bio.stabilityMargin < 0.3)
    cues.push({ p: 8, text: 'COM near edge of base. Shift weight toward center of your hands.' });

  // Bottleneck joint (torque analysis)
  if (bio.shoulderTorque > 0.01 || bio.hipTorque > 0.01) {
    const joint = JOINT_NAMES[bio.peakTorqueJoint];
    const torqueVal = [bio.shoulderTorque, bio.hipTorque, bio.kneeTorque][bio.peakTorqueJoint];
    if (torqueVal > 0.02)
      cues.push({ p: 3, text: `Highest torque at ${joint} — this joint is working hardest. Stack it over the wrists to reduce effort.` });
  }

  // COM drift warning
  if (bio.comSpeed > 0.08)
    cues.push({ p: 6, text: `High COM drift (${(bio.comSpeed*100).toFixed(0)} units/s). Find stillness — micro-adjust with fingers, not big body shifts.` });

  // Wall hold detection
  if (bio.holdType === 'wall' || bio.holdType === 'wall-likely') {
    cues.push({ p: 11, text: `Wall-assisted hold detected. Practice brief freestanding moments by pulling feet off the wall.` });
  }
  if (bio.holdType === 'spotted') {
    cues.push({ p: 2, text: `Possible spotter detected (low landmark visibility). Data may be less reliable.` });
  }

  // Phase-based cues
  if (bio.phases) {
    if (bio.phases.fatigue > 8)
      cues.push({ p: 5, text: `Alignment dropped ${bio.phases.fatigue.toFixed(0)} pts in final third — fatigue or balance loss. Bail earlier or build endurance.` });
    if (bio.phases.entryImprovement > 10)
      cues.push({ p: 2, text: `Entry was rough (${bio.phases.entryScore}) but you stabilized to ${bio.phases.steadyScore}. Work on cleaner kick-ups.` });
    if (bio.phases.steadyStability > 8)
      cues.push({ p: 4, text: `High variance during hold (±${bio.phases.steadyStability.toFixed(0)}). Focus on finding stillness.` });
  }

  // Alignment score summary
  const score = bio.alignmentScore;
  if (score !== undefined) {
    const grade = score >= 85 ? 'excellent' : score >= 70 ? 'good' : score >= 50 ? 'moderate' : 'needs work';
    cues.push({ p: 0, text: `Alignment: ${score}/100 (${grade}). ${duration >= 10 && score >= 70 ? 'Good hold — push for 15s+.' : ''}` });
  }

  cues.sort((a, b) => b.p - a.p);
  return cues.slice(0, 4);
}

// ── PERSON TRACKING HELPERS ──

// Cosine similarity between two L2-normalised vectors
function cosineSimilarity(a, b) {
  if (!a || !b || a.length !== b.length) return -1;
  let s = 0;
  for (let i = 0; i < a.length; i++) s += a[i] * b[i];
  return s;
}

// IoU between two [x1,y1,x2,y2] boxes
function iou(a, b) {
  const x1 = Math.max(a[0], b[0]);
  const y1 = Math.max(a[1], b[1]);
  const x2 = Math.min(a[2], b[2]);
  const y2 = Math.min(a[3], b[3]);
  if (x2 <= x1 || y2 <= y1) return 0;
  const inter = (x2 - x1) * (y2 - y1);
  const aArea = (a[2] - a[0]) * (a[3] - a[1]);
  const bArea = (b[2] - b[0]) * (b[3] - b[1]);
  return inter / (aArea + bArea - inter + 1e-9);
}

// Single-target tracker — Kalman constant-velocity (cx, cy, w, h, vx, vy, vw, vh)
class ByteTracker {
  constructor() {
    this.state = null;          // [cx, cy, w, h, vx, vy, vw, vh]
    this.lastDetectionFrame = 0;
    this.framesSinceUpdate = 0;
    this.maxMissingFrames = 30;
    this.embedding = null;
    this.confirmed = false;
  }

  bboxToState(bbox) {
    const [x1, y1, x2, y2] = bbox;
    return [(x1 + x2) / 2, (y1 + y2) / 2, x2 - x1, y2 - y1, 0, 0, 0, 0];
  }
  stateToBbox(s) {
    const [cx, cy, w, h] = s;
    return [cx - w / 2, cy - h / 2, cx + w / 2, cy + h / 2];
  }

  predict() {
    if (!this.state) return null;
    // constant velocity step
    this.state[0] += this.state[4];
    this.state[1] += this.state[5];
    this.state[2] += this.state[6];
    this.state[3] += this.state[7];
    // damp velocities slightly
    for (let i = 4; i < 8; i++) this.state[i] *= 0.95;
    this.framesSinceUpdate++;
    if (this.framesSinceUpdate > this.maxMissingFrames) {
      this.state = null;
      this.confirmed = false;
      return null;
    }
    return this.stateToBbox(this.state);
  }

  // detections: [{bbox, score, embedding?}]
  // returns the tracked person's bbox or null
  update(detections) {
    if (!detections || detections.length === 0) return this.predict();

    let best = null;
    let bestScore = -Infinity;

    if (calibrationEmbedding && detections.some(d => d.embedding)) {
      // Pick by ReID similarity to calibration
      for (const d of detections) {
        if (!d.embedding) continue;
        const sim = cosineSimilarity(calibrationEmbedding, d.embedding);
        if (sim > bestScore) { bestScore = sim; best = d; }
      }
      // Require minimum similarity to avoid locking onto wrong person
      if (bestScore < 0.35) best = null;
    }

    // Fallback: if we have a current state, prefer highest IoU match
    if (!best && this.state) {
      const predicted = this.stateToBbox(this.state);
      for (const d of detections) {
        const score = iou(predicted, d.bbox);
        if (score > bestScore && score > 0.1) { bestScore = score; best = d; }
      }
    }

    // Final fallback: highest confidence detection (initial lock)
    if (!best) {
      for (const d of detections) {
        if (d.score > bestScore) { bestScore = d.score; best = d; }
      }
    }

    if (best) {
      const measured = this.bboxToState(best.bbox);
      if (this.state) {
        // Simple alpha blend (cheap stand-in for full Kalman update)
        const alpha = 0.6;
        for (let i = 0; i < 4; i++) {
          // velocity = new measurement - previous position
          this.state[i + 4] = (measured[i] - this.state[i]) * alpha + this.state[i + 4] * (1 - alpha);
          this.state[i] = measured[i] * alpha + this.state[i] * (1 - alpha);
        }
      } else {
        this.state = measured;
      }
      if (best.embedding) this.embedding = best.embedding;
      this.framesSinceUpdate = 0;
      this.confirmed = true;
      return this.stateToBbox(this.state);
    }

    return this.predict();
  }
}

// ── YOLOv8n inference ──
// Returns array of detections in normalised image coords: [{bbox:[x1,y1,x2,y2], score}]
// imageSource must be a drawable (HTMLVideoElement | HTMLCanvasElement).
async function detectPersons(imageSource, srcW, srcH) {
  if (!yoloSession) return [];
  const INPUT = 640;

  // Letterbox preprocess into 640x640
  const scale = Math.min(INPUT / srcW, INPUT / srcH);
  const newW = Math.round(srcW * scale);
  const newH = Math.round(srcH * scale);
  const padX = Math.floor((INPUT - newW) / 2);
  const padY = Math.floor((INPUT - newH) / 2);

  // Use offscreen canvas for resize
  const tmp = detectPersons._canvas || (detectPersons._canvas = document.createElement('canvas'));
  tmp.width = INPUT; tmp.height = INPUT;
  const tctx = tmp.getContext('2d', { willReadFrequently: true });
  tctx.fillStyle = 'rgb(114,114,114)';
  tctx.fillRect(0, 0, INPUT, INPUT);
  tctx.drawImage(imageSource, padX, padY, newW, newH);
  const imgData = tctx.getImageData(0, 0, INPUT, INPUT).data;

  // CHW float32, [0,1]
  const data = new Float32Array(3 * INPUT * INPUT);
  const planeSize = INPUT * INPUT;
  for (let i = 0; i < planeSize; i++) {
    data[i] = imgData[i * 4] / 255;                  // R
    data[i + planeSize] = imgData[i * 4 + 1] / 255;  // G
    data[i + 2 * planeSize] = imgData[i * 4 + 2] / 255; // B
  }
  const tensor = new ort.Tensor('float32', data, [1, 3, INPUT, INPUT]);

  let output;
  try {
    const feeds = {};
    feeds[yoloSession.inputNames[0]] = tensor;
    const out = await yoloSession.run(feeds);
    output = out[yoloSession.outputNames[0]];
    yoloInferenceCount++;
  } catch (e) {
    console.warn('YOLO inference failed:', e);
    return [];
  }

  // YOLOv8 output shape: [1, 84, 8400] (or [1, 8400, 84] depending on export)
  // 84 = 4 box + 80 class scores. We only care about class 0 (person).
  const dims = output.dims;
  const arr = output.data;
  let numBoxes, numChannels, transposed;
  if (dims[1] === 84) { numChannels = 84; numBoxes = dims[2]; transposed = true; }
  else { numChannels = dims[2]; numBoxes = dims[1]; transposed = false; }

  const detections = [];
  const CONF_THRESH = 0.4;
  for (let i = 0; i < numBoxes; i++) {
    let cx, cy, w, h, personScore;
    if (transposed) {
      cx = arr[0 * numBoxes + i];
      cy = arr[1 * numBoxes + i];
      w  = arr[2 * numBoxes + i];
      h  = arr[3 * numBoxes + i];
      personScore = arr[4 * numBoxes + i]; // class 0 = person
    } else {
      cx = arr[i * numChannels + 0];
      cy = arr[i * numChannels + 1];
      w  = arr[i * numChannels + 2];
      h  = arr[i * numChannels + 3];
      personScore = arr[i * numChannels + 4];
    }
    if (personScore < CONF_THRESH) continue;

    // Undo letterbox → original image coords (still in [0,1] of original)
    const x1 = Math.max(0, (cx - w/2 - padX) / scale / srcW);
    const y1 = Math.max(0, (cy - h/2 - padY) / scale / srcH);
    const x2 = Math.min(1, (cx + w/2 - padX) / scale / srcW);
    const y2 = Math.min(1, (cy + h/2 - padY) / scale / srcH);
    if (x2 <= x1 || y2 <= y1) continue;
    detections.push({ bbox: [x1, y1, x2, y2], score: personScore });
  }

  // Simple NMS
  detections.sort((a, b) => b.score - a.score);
  const kept = [];
  for (const d of detections) {
    let drop = false;
    for (const k of kept) {
      if (iou(d.bbox, k.bbox) > 0.5) { drop = true; break; }
    }
    if (!drop) kept.push(d);
    if (kept.length >= 5) break; // cap detections
  }
  return kept;
}

// ── OSNet x0_25 ReID ──
// Returns 256-dim L2-normalised embedding (Float32Array) or null on failure.
async function getPersonEmbedding(imageSource, bbox, srcW, srcH) {
  if (!reidSession) return null;
  const REID_W = 128, REID_H = 256;

  const [nx1, ny1, nx2, ny2] = bbox;
  const x = Math.max(0, Math.floor(nx1 * srcW));
  const y = Math.max(0, Math.floor(ny1 * srcH));
  const w = Math.max(2, Math.floor((nx2 - nx1) * srcW));
  const h = Math.max(2, Math.floor((ny2 - ny1) * srcH));
  if (x + w > srcW || y + h > srcH) return null;

  const tmp = getPersonEmbedding._canvas || (getPersonEmbedding._canvas = document.createElement('canvas'));
  tmp.width = REID_W; tmp.height = REID_H;
  const tctx = tmp.getContext('2d', { willReadFrequently: true });
  tctx.drawImage(imageSource, x, y, w, h, 0, 0, REID_W, REID_H);
  const imgData = tctx.getImageData(0, 0, REID_W, REID_H).data;

  // ImageNet normalisation
  const MEAN = [0.485, 0.456, 0.406];
  const STD  = [0.229, 0.224, 0.225];
  const data = new Float32Array(3 * REID_H * REID_W);
  const planeSize = REID_H * REID_W;
  for (let i = 0; i < planeSize; i++) {
    data[i]              = (imgData[i*4]   / 255 - MEAN[0]) / STD[0];
    data[i + planeSize]  = (imgData[i*4+1] / 255 - MEAN[1]) / STD[1];
    data[i + 2*planeSize] = (imgData[i*4+2] / 255 - MEAN[2]) / STD[2];
  }
  const tensor = new ort.Tensor('float32', data, [1, 3, REID_H, REID_W]);

  let output;
  try {
    const feeds = {};
    feeds[reidSession.inputNames[0]] = tensor;
    const out = await reidSession.run(feeds);
    output = out[reidSession.outputNames[0]];
    reidInferenceCount++;
  } catch (e) {
    console.warn('OSNet inference failed:', e);
    return null;
  }

  const emb = Array.from(output.data);
  // L2 normalise
  let norm = 0;
  for (const v of emb) norm += v * v;
  norm = Math.sqrt(norm) || 1;
  for (let i = 0; i < emb.length; i++) emb[i] /= norm;
  return emb;
}

// ── ONNX session lifecycle ──
async function initOnnxSessions() {
  if (typeof ort === 'undefined') {
    console.warn('ONNX Runtime Web not loaded');
    return;
  }
  const ep = ['webgpu', 'wasm'];
  try {
    yoloSession = await ort.InferenceSession.create(MODEL_BASE + 'yolov8n.onnx', { executionProviders: ep });
    reidSession = await ort.InferenceSession.create(MODEL_BASE + 'osnet_x0_25.onnx', { executionProviders: ep });
    byteTracker = new ByteTracker();
    yoloInferenceCount = 0;
    reidInferenceCount = 0;
    console.log('ONNX sessions initialised', { yolo: !!yoloSession, reid: !!reidSession });
  } catch (e) {
    console.warn('ONNX init failed, tracking disabled:', e);
    yoloSession = null; reidSession = null; byteTracker = null;
  }
}

// iOS Safari WebGPU stability — recreate sessions periodically
async function maybeRecreateOnnxSessions() {
  if (yoloInferenceCount < ONNX_SESSION_RECREATE_AT && reidInferenceCount < ONNX_SESSION_RECREATE_AT) return;
  console.log('Recreating ONNX sessions for stability');
  const oldYolo = yoloSession, oldReid = reidSession;
  yoloSession = null; reidSession = null;
  try { await oldYolo?.release?.(); } catch {}
  try { await oldReid?.release?.(); } catch {}
  await initOnnxSessions();
}

// Per-frame tracking step — runs YOLO occasionally, Kalman every frame
async function trackFrame(videoSource, srcW, srcH) {
  if (!byteTracker || !yoloSession) return;
  // Calibration owns ONNX exclusively while it runs (avoids concurrent run() collisions).
  if (isCalibrating) {
    trackedBbox = byteTracker.predict();
    return;
  }
  if (onnxBusy) {
    // Just run a Kalman predict to keep momentum
    trackedBbox = byteTracker.predict();
    return;
  }
  yoloFrameCounter++;
  const shouldDetect = (yoloFrameCounter % YOLO_DETECT_INTERVAL === 0);

  if (!shouldDetect) {
    trackedBbox = byteTracker.predict();
    return;
  }

  onnxBusy = true;
  try {
    const detections = await detectPersons(videoSource, srcW, srcH);

    // Compute embeddings only for top-2 detections to keep cost down,
    // and only when we have a calibration to match against.
    if (calibrationEmbedding && detections.length > 0) {
      const top = detections.slice(0, 2);
      for (const d of top) {
        d.embedding = await getPersonEmbedding(videoSource, d.bbox, srcW, srcH);
      }
    }

    trackedBbox = byteTracker.update(detections);
    await maybeRecreateOnnxSessions();
  } catch (e) {
    console.warn('trackFrame error:', e);
  } finally {
    onnxBusy = false;
  }
}

// ── CALIBRATION ──
async function calibrateUser() {
  if (!cameraStarted) { showToast('start camera first'); return; }
  if (!yoloSession || !reidSession) { showToast('models not loaded'); return; }
  if (isCalibrating) return;
  isCalibrating = true;

  const status = document.getElementById('pose-status');
  const oldStatus = status.textContent;
  const calBtn = document.getElementById('cal-btn');
  if (calBtn) { calBtn.disabled = true; calBtn.textContent = 'CAL…'; }
  status.textContent = 'CALIBRATING — stand in frame for 3 seconds';
  showToast('calibrating — stand in frame');

  const FRAMES = 5;
  const INTERVAL = 600; // ms; ~3s total
  const embeddings = [];

  for (let i = 0; i < FRAMES; i++) {
    await new Promise(r => setTimeout(r, INTERVAL));
    if (!videoEl) break;
    const w = videoEl.videoWidth, h = videoEl.videoHeight;
    if (!w || !h) continue;
    try {
      const dets = await detectPersons(videoEl, w, h);
      if (dets.length === 0) continue;
      // Pick largest bbox (most likely the calibrating user)
      dets.sort((a, b) => {
        const aArea = (a.bbox[2]-a.bbox[0]) * (a.bbox[3]-a.bbox[1]);
        const bArea = (b.bbox[2]-b.bbox[0]) * (b.bbox[3]-b.bbox[1]);
        return bArea - aArea;
      });
      const emb = await getPersonEmbedding(videoEl, dets[0].bbox, w, h);
      if (emb) embeddings.push(emb);
    } catch (e) { console.warn('calibration frame failed', e); }
  }

  if (embeddings.length === 0) {
    status.textContent = oldStatus;
    if (calBtn) { calBtn.disabled = false; calBtn.textContent = 'CAL'; }
    showToast('calibration failed — no person detected');
    isCalibrating = false;
    return;
  }

  // Average + L2 normalise
  const dim = embeddings[0].length;
  const avg = new Array(dim).fill(0);
  for (const e of embeddings) for (let i = 0; i < dim; i++) avg[i] += e[i];
  for (let i = 0; i < dim; i++) avg[i] /= embeddings.length;
  let norm = 0;
  for (const v of avg) norm += v * v;
  norm = Math.sqrt(norm) || 1;
  for (let i = 0; i < dim; i++) avg[i] /= norm;
  calibrationEmbedding = avg;
  try { localStorage.setItem('calibrationEmbedding', JSON.stringify(avg)); } catch {}

  // Reset tracker so the calibrated person locks in fresh
  if (byteTracker) byteTracker = new ByteTracker();

  status.textContent = 'CALIBRATED';
  showToast(`calibrated · ${embeddings.length} samples`);
  setTimeout(() => { status.textContent = oldStatus; }, 2000);
  if (calBtn) { calBtn.disabled = false; calBtn.textContent = 'CAL ✓'; }
  isCalibrating = false;
}

// ── CAMERA + POSE ──
async function startCamera() {
  if (cameraStarted) return;
  videoEl = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const camBtn = document.getElementById('cam-btn');
  camBtn.textContent = 'STARTING...';
  camBtn.disabled = true;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode } });
    videoEl.srcObject = stream;
    await new Promise(r => videoEl.onloadedmetadata = r);
    canvas.width = videoEl.videoWidth;
    canvas.height = videoEl.videoHeight;

    // Check hardware zoom support
    cameraTrack = stream.getVideoTracks()[0];
    const caps = cameraTrack.getCapabilities?.() || {};
    const slider = document.getElementById('zoom-slider');
    if (caps.zoom) {
      hwZoomSupported = true;
      hwZoomMin = caps.zoom.min;
      hwZoomMax = caps.zoom.max;
      slider.min = hwZoomMin;
      slider.max = hwZoomMax;
      slider.step = (hwZoomMax - hwZoomMin) / 20;
      slider.value = hwZoomMin;
      zoomLevel = hwZoomMin;
    } else {
      slider.min = 0.5;
      slider.max = 3;
      slider.step = 0.1;
      slider.value = 1;
      zoomLevel = 1;
    }

    cameraStarted = true;
    document.getElementById('camera-view').classList.remove('camera-inactive');
    applyMirror();
    camBtn.style.display = 'none';
    document.getElementById('rec-btn').style.display = 'inline-block';
    document.getElementById('debug-btn').style.display = 'inline-block';
    document.getElementById('zoom-row').classList.add('visible');
    document.getElementById('pose-status').textContent = 'loading pose model...';

    // Initialise ONNX person-tracking sessions (graceful failure if models missing)
    initOnnxSessions().catch(e => console.warn('ONNX init error:', e));

    // Show CAL button now that camera is live
    const calBtn = document.getElementById('cal-btn');
    if (calBtn) {
      calBtn.style.display = 'inline-block';
      if (calibrationEmbedding) calBtn.textContent = 'CAL ✓';
    }

    const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

    pose.onResults(results => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.scale(-1, 1);
      if (!hwZoomSupported && zoomLevel !== 1) {
        if (zoomLevel > 1) {
          // Digital zoom in: crop center of source
          const dz = 1 / zoomLevel;
          const sw = videoEl.videoWidth * dz, sh = videoEl.videoHeight * dz;
          const sx = (videoEl.videoWidth - sw) / 2, sy = (videoEl.videoHeight - sh) / 2;
          ctx.drawImage(videoEl, sx, sy, sw, sh, -canvas.width, 0, canvas.width, canvas.height);
        } else {
          // Digital zoom out: shrink video, black bars
          const dw = canvas.width * zoomLevel, dh = canvas.height * zoomLevel;
          const dx = (canvas.width - dw) / 2, dy = (canvas.height - dh) / 2;
          ctx.fillStyle = '#000';
          ctx.fillRect(-canvas.width, 0, canvas.width, canvas.height);
          ctx.drawImage(videoEl, -(dx + dw), dy, dw, dh);
        }
      } else {
        ctx.drawImage(videoEl, -canvas.width, 0, canvas.width, canvas.height);
      }
      ctx.restore();

      if (results.poseLandmarks) {
        const lm = results.poseLandmarks;

        // Person-tracking gate: when calibration + tracker are active, ensure
        // MediaPipe's detected person matches our tracked target. Use wrist
        // midpoint (lm[15]/lm[16]) as a reliable handstand-friendly proxy
        // (head can be near edge of frame, but hands are usually visible).
        // Landmarks are in unflipped image space; bbox is too — no mirror flip.
        if (trackedBbox && calibrationEmbedding) {
          const wristMid = {
            x: (lm[15].x + lm[16].x) / 2,
            y: (lm[15].y + lm[16].y) / 2
          };
          const [bx1, by1, bx2, by2] = trackedBbox;
          // Allow a small margin for inverted poses (hands near image edge)
          const margin = 0.05;
          if (wristMid.x < bx1 - margin || wristMid.x > bx2 + margin ||
              wristMid.y < by1 - margin || wristMid.y > by2 + margin) {
            return; // wrong person — skip this frame entirely
          }
        }

        currentView = detectView(lm);
        currentShape = detectShape(lm);

        document.getElementById('view-badge').textContent = currentView;
        const shapeBadge = document.getElementById('shape-badge');
        if (isHolding) {
          shapeBadge.textContent = currentShape;
          shapeBadge.style.display = 'block';
        } else {
          shapeBadge.style.display = 'none';
        }

        drawSkeleton(ctx, lm, canvas.width, canvas.height, currentView);
        if (isHolding) drawBioOverlay(ctx, lm, canvas.width, canvas.height);
        updateHoldState(isHandstand(lm), lm);

        // Debug
        const dbg = document.getElementById('debug-info');
        if (dbg && dbg.style.display !== 'none') {
          const bio = computeBiomechanics(lm);
          const speed = Math.sqrt(smoothComVx**2 + smoothComVy**2);
          const ankleMove = ankleMovementCount > 0 ? (ankleMovementSum / ankleMovementCount) : 0;
          dbg.innerHTML =
            `${currentView} | ${currentShape} | align ${bio.alignmentScore} | stb ${(bio.stabilityMargin*100).toFixed(0)}%<br>` +
            `shldr ${bio.shoulderAngle.toFixed(0)}° | hip ${bio.hipAngle.toFixed(0)}° | knee ${bio.kneeAngle.toFixed(0)}° | elbow ${bio.elbowAngle.toFixed(0)}°<br>` +
            `COM Δx=${bio.comOffsetX.toFixed(3)} vel=${(speed*100).toFixed(1)}/s<br>` +
            `torque s=${bio.shoulderTorque.toFixed(3)} h=${bio.hipTorque.toFixed(3)} peak=${JOINT_NAMES[bio.peakTorqueJoint]}<br>` +
            `ankle edge=${bio.ankleAtEdge} move=${ankleMove.toFixed(4)} vis=${bio.avgVisibility.toFixed(2)}`;
        }
      }
    });

    const camera = new Camera(videoEl, {
      onFrame: async () => {
        // Keep canvas in sync with actual video dimensions
        if (canvas.width !== videoEl.videoWidth || canvas.height !== videoEl.videoHeight) {
          canvas.width = videoEl.videoWidth;
          canvas.height = videoEl.videoHeight;
        }
        // Person-tracking step (YOLO every N frames, Kalman every frame)
        // Updates `trackedBbox` so it's fresh by the time onResults runs.
        if (yoloSession && byteTracker) {
          // Don't await — let it race with pose.send for throughput.
          // The tracker state is consistent because trackFrame guards with onnxBusy.
          trackFrame(videoEl, videoEl.videoWidth, videoEl.videoHeight);
        }
        await pose.send({ image: videoEl });
      }
    });
    camera.start();
    document.getElementById('pose-status').textContent = 'detecting pose...';

  } catch(e) {
    document.getElementById('pose-status').textContent = 'camera error — use manual log';
    camBtn.textContent = 'START CAMERA'; camBtn.disabled = false;
  }
}

function isHandstand(lm) {
  const wristY   = Math.max(lm[15].y, lm[16].y);
  const ankleY   = Math.min(lm[27].y, lm[28].y);
  const hipY     = (lm[23].y + lm[24].y) / 2;
  const shoulderY = (lm[11].y + lm[12].y) / 2;
  return wristY > 0.6 && ankleY < 0.45 && lm[0].y > hipY && shoulderY > hipY;
}

function drawSkeleton(ctx, lm, w, h, view) {
  const connections = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[24,26],[25,27],[26,28]];
  ctx.strokeStyle = isHolding ? 'rgba(127,255,178,0.8)' : 'rgba(100,180,255,0.5)';
  ctx.lineWidth = 2;
  connections.forEach(([a,b]) => {
    const pa = lm[a], pb = lm[b];
    if (pa.visibility > 0.5 && pb.visibility > 0.5) {
      ctx.beginPath(); ctx.moveTo((1-pa.x)*w, pa.y*h); ctx.lineTo((1-pb.x)*w, pb.y*h); ctx.stroke();
    }
  });
  ctx.fillStyle = isHolding ? 'rgba(255,0,255,0.9)' : 'rgba(255,0,255,0.7)';
  [11,12,13,14,15,16,23,24,25,26,27,28].forEach(i => {
    const p = lm[i];
    if (p.visibility > 0.5) { ctx.beginPath(); ctx.arc((1-p.x)*w, p.y*h, 4, 0, Math.PI*2); ctx.fill(); }
  });

  // body line overlay in side view during hold
  if (view === 'side' && isHolding) {
    const wrist    = { x: (1 - (lm[15].x + lm[16].x)/2) * w, y: (lm[15].y + lm[16].y)/2 * h };
    const shoulder = { x: (1 - (lm[11].x + lm[12].x)/2) * w, y: (lm[11].y + lm[12].y)/2 * h };
    const hip      = { x: (1 - (lm[23].x + lm[24].x)/2) * w, y: (lm[23].y + lm[24].y)/2 * h };
    const ankle    = { x: (1 - (lm[27].x + lm[28].x)/2) * w, y: (lm[27].y + lm[28].y)/2 * h };

    // ideal straight line
    ctx.save();
    ctx.setLineDash([4,4]);
    ctx.strokeStyle = 'rgba(255,255,100,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(wrist.x, wrist.y); ctx.lineTo(ankle.x, ankle.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

function drawBioOverlay(ctx, lm, w, h) {
  const bio = computeBiomechanics(lm);
  ctx.save();

  // Vertical reference line through wrist midpoint
  const wristX = (1 - (lm[15].x + lm[16].x) / 2) * w;
  ctx.setLineDash([2, 6]);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(wristX, 0); ctx.lineTo(wristX, h); ctx.stroke();
  ctx.setLineDash([]);

  // COM dot — colored by stability
  const comScreenX = (1 - bio.comX) * w;
  const comScreenY = bio.comY * h;
  const sm = bio.stabilityMargin;
  const comColor = sm > 0.6 ? 'rgba(127,255,178,0.9)'
                 : sm > 0.3 ? 'rgba(255,210,100,0.9)'
                 :            'rgba(255,100,100,0.9)';

  // COM trail line from wrists to COM
  ctx.strokeStyle = comColor;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.4;
  ctx.beginPath(); ctx.moveTo(wristX, (lm[15].y + lm[16].y) / 2 * h); ctx.lineTo(comScreenX, comScreenY); ctx.stroke();
  ctx.globalAlpha = 1;

  // COM dot
  ctx.beginPath(); ctx.arc(comScreenX, comScreenY, 7, 0, Math.PI * 2);
  ctx.fillStyle = comColor; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();

  // COM velocity arrow
  const velScale = 500; // amplify for visibility
  const vxScreen = -smoothComVx * velScale; // flip x for mirrored canvas
  const vyScreen = smoothComVy * velScale;
  const velMag = Math.sqrt(vxScreen**2 + vyScreen**2);
  if (velMag > 3) {
    ctx.strokeStyle = 'rgba(255,200,100,0.7)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(comScreenX, comScreenY);
    ctx.lineTo(comScreenX + vxScreen, comScreenY + vyScreen);
    ctx.stroke();
    // Arrowhead
    const angle = Math.atan2(vyScreen, vxScreen);
    ctx.beginPath();
    ctx.moveTo(comScreenX + vxScreen, comScreenY + vyScreen);
    ctx.lineTo(comScreenX + vxScreen - 6*Math.cos(angle-0.4), comScreenY + vyScreen - 6*Math.sin(angle-0.4));
    ctx.moveTo(comScreenX + vxScreen, comScreenY + vyScreen);
    ctx.lineTo(comScreenX + vxScreen - 6*Math.cos(angle+0.4), comScreenY + vyScreen - 6*Math.sin(angle+0.4));
    ctx.stroke();
  }

  // Stability meter (left edge)
  const meterW = 4, meterH = 60;
  const meterX = 12, meterY = 40;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(meterX, meterY, meterW, meterH);
  const fill = sm * meterH;
  ctx.fillStyle = comColor;
  ctx.fillRect(meterX, meterY + meterH - fill, meterW, fill);
  ctx.font = '8px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('STB', meterX - 1, meterY - 4);

  // Alignment score (top-right corner)
  const score = bio.alignmentScore;
  const scoreColor = score >= 85 ? 'rgba(127,255,178,0.9)'
                   : score >= 70 ? 'rgba(200,184,255,0.9)'
                   : score >= 50 ? 'rgba(255,210,100,0.9)'
                   :               'rgba(255,100,100,0.9)';
  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = scoreColor;
  ctx.textAlign = 'right';
  ctx.fillText(score, w - 14, 56);
  ctx.font = '8px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('ALIGN', w - 14, 66);
  ctx.textAlign = 'left';

  // Bottleneck joint indicator
  const peakTorque = [bio.shoulderTorque, bio.hipTorque, bio.kneeTorque][bio.peakTorqueJoint];
  if (peakTorque > 0.008) {
    const jointLm = [[11,12],[23,24],[25,26]][bio.peakTorqueJoint];
    const jx = (1 - (lm[jointLm[0]].x + lm[jointLm[1]].x) / 2) * w;
    const jy = ((lm[jointLm[0]].y + lm[jointLm[1]].y) / 2) * h;
    ctx.beginPath(); ctx.arc(jx, jy, 10, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,100,100,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.font = '7px monospace';
    ctx.fillStyle = 'rgba(255,100,100,0.8)';
    ctx.fillText('TORQUE', jx + 14, jy + 3);
  }

  ctx.restore();
}

function scoreFrame(lm) {
  // Lower = better alignment. Uses body line deviation from wrist-ankle line.
  const bl = analyzeBodyLine(lm);
  return Math.abs(bl.hipDev) + Math.abs(bl.shoulderDev);
}

function sampleHoldFrame(lm) {
  const now = Date.now();
  if (now - lastSampleTime < 500) return; // sample every 0.5s
  lastSampleTime = now;

  const shape = currentShape;
  const view = currentView;
  const score = scoreFrame(lm);
  const prev = holdFrameCandidates[shape];

  if (!prev || score < prev.score) {
    holdFrameCandidates[shape] = {
      frame: document.getElementById('canvas').toDataURL('image/jpeg', 0.85),
      score,
      view
    };
  }

  // Track time per shape
  if (!holdShapeTimes[shape]) holdShapeTimes[shape] = 0;
  holdShapeTimes[shape] += now - (lastShapeChangeTime || now);
  lastShapeChangeTime = now;
}

function updateHoldState(handstand, lm) {
  const dot = document.getElementById('pose-dot');
  const status = document.getElementById('pose-status');

  if (handstand && !isHolding) {
    isHolding = true;
    holdStart = Date.now();
    holdFrameCandidates = {};
    holdShapeTimes = {};
    lastSampleTime = 0;
    lastShapeChangeTime = Date.now();
    resetBioAccum();
    dot.classList.add('active');
    status.textContent = 'handstand detected — holding';
    startTimerDisplay();
  } else if (handstand && isHolding) {
    // Mid-hold: sample frames + biomechanics
    sampleHoldFrame(lm);
    accumBio(lm);
  } else if (!handstand && isHolding) {
    isHolding = false;
    holdDuration = (Date.now() - holdStart) / 1000;
    dot.classList.remove('active');
    status.textContent = 'detecting pose...';
    stopTimerDisplay();
    document.getElementById('shape-badge').style.display = 'none';

    if (holdDuration >= 1.0) {
      // Finalize best frames per shape
      lastHoldFrames = holdFrameCandidates;
      lastHoldDuration = holdDuration;

      // Dominant shape = most time spent
      const dominant = Object.entries(holdShapeTimes).sort((a,b) => b[1] - a[1])[0];
      lastHoldShape = dominant ? dominant[0] : currentShape;
      lastHoldView = lastHoldFrames[lastHoldShape]?.view || currentView;
      lastHoldBio = finalizeBio();

      if (isRecording) recHolds.push(holdDuration);
      autoSaveHold(holdDuration);
      updateFeedbackCard();
    }
  }
}

function updateFeedbackCard() {
  document.getElementById('fb-placeholder').style.display = 'none';
  document.getElementById('fb-text').style.display = 'none';
  document.getElementById('fb-loading').style.display = 'none';

  document.getElementById('fb-shape').textContent = lastHoldShape || '';
  const holdType = lastHoldBio?.holdType || '';
  const viewLabel = holdType && holdType !== 'freestanding' ? `${lastHoldView} · ${holdType}` : (lastHoldView || '');
  document.getElementById('fb-view').textContent = viewLabel;

  const shapes = Object.keys(lastHoldFrames);
  const carousel = document.getElementById('frame-carousel');
  const track = document.getElementById('frame-track');
  const dots = document.getElementById('frame-dots');
  track.innerHTML = '';
  dots.innerHTML = '';

  if (shapes.length > 0) {
    shapes.forEach((shape, i) => {
      const entry = lastHoldFrames[shape];
      const slide = document.createElement('div');
      slide.className = 'frame-slide';
      slide.innerHTML = `<img src="${entry.frame}" alt="${shape}" onclick="expandFrame(${i})"><div class="frame-label">${shape} · ${entry.view} · ${entry.score.toFixed(3)}</div>`;
      track.appendChild(slide);

      const dot = document.createElement('div');
      dot.className = 'frame-dot' + (i === 0 ? ' active' : '');
      dot.onclick = () => goToFrame(i);
      dots.appendChild(dot);
    });
    carousel.style.display = 'block';
    carouselIndex = 0;
    carouselShapes = shapes;
    initCarouselSwipe();
  } else {
    carousel.style.display = 'none';
  }

  // Physics-based coaching cues — immediate, offline, no API key needed
  if (lastHoldBio) {
    const cues = generateCoachingCues(lastHoldBio, lastHoldShape, lastHoldView, lastHoldDuration);
    document.getElementById('fb-text').textContent = cues.map(c => c.text).join('\n\n');
    document.getElementById('fb-text').style.display = 'block';
    document.getElementById('feedback-card').classList.add('has-content');
  } else {
    document.getElementById('fb-placeholder').textContent = 'hold detected';
    document.getElementById('fb-placeholder').style.display = 'block';
  }

  // Claude AI analysis — optional upgrade when online + API key set
  const threshold = parseFloat(getSetting('threshold', '3'));
  const apiKey = getSetting('apiKey', '');
  const analyseBtn = document.getElementById('analyse-btn');
  analyseBtn.style.display = (lastHoldDuration >= threshold && apiKey) ? 'inline-block' : 'none';
}

// ── CLAUDE ANALYSIS ──
async function analyseLastHold() {
  const shapes = Object.keys(lastHoldFrames);
  if (shapes.length === 0) return;
  const apiKey = getSetting('apiKey', '');

  const viewNote = lastHoldView === 'side'
    ? 'The camera is positioned from the side — body line and banana/pike are visible.'
    : 'The camera is positioned from the front — leg shape and symmetry are visible, but spinal alignment is limited.';

  // Build image content — one best frame per shape
  const imageContent = shapes.map(shape => {
    const entry = lastHoldFrames[shape];
    return [
      { type: 'text', text: `[Best frame — ${shape} shape, ${entry.view} view, alignment score ${entry.score.toFixed(3)}]` },
      { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: entry.frame.split(',')[1] } }

  }).flat();

  const shapeSummary = shapes.length > 1
    ? `Shapes observed: ${shapes.join(', ')}. Dominant shape: ${lastHoldShape}.`
    : `Shape: ${lastHoldShape}.`;

  const bioNote = lastHoldBio ? `
Biomechanics (averaged over ${lastHoldBio.frameCount} frames):
Alignment score: ${lastHoldBio.alignmentScore.toFixed(0)}/100.
Shoulder: ${lastHoldBio.shoulderAngle.toFixed(1)}°. Hip: ${lastHoldBio.hipAngle.toFixed(1)}°. Knee: ${lastHoldBio.kneeAngle.toFixed(1)}°. Elbow: ${lastHoldBio.elbowAngle.toFixed(1)}° (all 180=ideal).
COM offset: x=${lastHoldBio.comOffsetX.toFixed(3)}. COM drift speed: ${(lastHoldBio.comSpeed*100).toFixed(1)}/s. Banana: ${lastHoldBio.bananaScore.toFixed(3)} (>0=banana).
Torques — shoulder: ${lastHoldBio.shoulderTorque.toFixed(3)}, hip: ${lastHoldBio.hipTorque.toFixed(3)} (higher=more effort). Peak: ${JOINT_NAMES[Math.round(lastHoldBio.peakTorqueJoint)]}.
Stability: ${(lastHoldBio.stabilityMargin*100).toFixed(0)}%. Hip tilt: ${lastHoldBio.hipTilt.toFixed(3)}. Shoulder tilt: ${lastHoldBio.shoulderTilt.toFixed(3)}.` : '';

  const prompt = `You are a handstand coach. This is a ${lastHoldDuration.toFixed(1)}s handstand hold. ${shapeSummary} ${viewNote}${bioNote}

Give 2-3 terse, specific coaching cues grounded in the biomechanics data. Prioritise the most critical alignment issue. Be direct — no filler, no encouragement, just what to fix. Max 60 words.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-3-5-haiku-20241022',
        max_tokens: 200,
        messages: [{
          role: 'user',
          content: [...imageContent, { type: 'text', text: prompt }]
        }]

    const data = await res.json();
    const text = data.content?.[0]?.text || data.error?.message || 'no response';
    document.getElementById('fb-loading').style.display = 'none';
    document.getElementById('fb-text').textContent = text;
    document.getElementById('fb-text').style.display = 'block';
    analyseBtn.style.display = 'none';

    if (db.length > 0 && db[0].auto) { db[0].aiCues = text; persist(); }

  } catch(e) {
    document.getElementById('fb-loading').style.display = 'none';
    document.getElementById('fb-placeholder').textContent = 'analysis failed — check API key';
    document.getElementById('fb-placeholder').style.display = 'block';
